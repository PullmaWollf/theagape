name: Disparar Alarmes de Push

on:
  schedule:
    # Roda a cada minuto (gratuito no GitHub Actions)
    - cron: '* * * * *'
  # Permite rodar manualmente pelo GitHub para testar
  workflow_dispatch:

jobs:
  disparar-alarmes:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Verificar e disparar alarmes pendentes
        run: |
          echo "⏰ Verificando alarmes: $(date -u)"

          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/cron-alarms")

          echo "Status HTTP: $RESPONSE"
          echo "Resposta: $(cat /tmp/response.json)"

          if [ "$RESPONSE" != "200" ]; then
            echo "⚠️ Erro ao chamar cron-alarms: $RESPONSE"
            exit 1
          fi

          PROCESSED=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('processed',0))")
          echo "✅ Alarmes processados: $PROCESSED"
